server {
    listen 80;
    server_tokens off;
    client_max_body_size 20m;

    location /api/ {
        proxy_set_header Host $http_host;
        proxy_pass http://backend:8000/api/;
    }

    location /admin/ {
        proxy_set_header Host $http_host;
        proxy_pass http://backend:8000/admin/;
    }

    location /media/ {
        alias /media/;
    }

    location / {
        root /staticfiles/;
        index index.html index.htm;
        try_files $uri /index.html;
    }
}